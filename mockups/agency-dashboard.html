<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #F8F7F4;
      color: #1a1714;
      width: 390px;
      min-height: 844px;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #E8E4DD;
      background: white;
    }
    .topbar-logo {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .topbar-logo span { color: #B5634B; }
    .topbar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #B5634B;
      color: white;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #E8E4DD;
      background: white;
      padding: 0 20px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: #1a1714;
      border-bottom-color: #B5634B;
    }
    .content { padding: 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #B5634B;
      margin-bottom: 12px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #E8E4DD;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #1a1714;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 10px;
      color: #999;
      font-weight: 500;
    }
    .stat-change {
      font-size: 10px;
      font-weight: 600;
      color: #4A8C5C;
      margin-top: 4px;
    }
    .client-list { margin-bottom: 24px; }
    .client-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: white;
      border: 1px solid #E8E4DD;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .client-info { display: flex; align-items: center; gap: 10px; }
    .client-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .client-dot.green { background: #4A8C5C; }
    .client-dot.yellow { background: #C49A3C; }
    .client-dot.blue { background: #4A7CB5; }
    .client-name {
      font-size: 13px;
      font-weight: 600;
    }
    .client-type {
      font-size: 10px;
      color: #999;
    }
    .client-metric {
      text-align: right;
    }
    .client-metric-value {
      font-size: 13px;
      font-weight: 700;
    }
    .client-metric-label {
      font-size: 9px;
      color: #999;
    }
    .chart-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #E8E4DD;
      margin-bottom: 20px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .chart-title {
      font-size: 13px;
      font-weight: 700;
    }
    .chart-period {
      font-size: 10px;
      color: #999;
      font-weight: 500;
    }
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
    }
    .bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      background: #E8E4DD;
      position: relative;
    }
    .bar.accent { background: #B5634B; }
    .bar.light { background: #D4C9B4; }
    .bar-labels {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .bar-label {
      flex: 1;
      text-align: center;
      font-size: 8px;
      color: #999;
    }
    .pipeline-section { margin-top: 4px; }
    .pipeline-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #F0EDE8;
    }
    .pipeline-stage {
      font-size: 11px;
      font-weight: 600;
      width: 70px;
    }
    .pipeline-bar-bg {
      flex: 1;
      height: 6px;
      background: #F0EDE8;
      border-radius: 3px;
      overflow: hidden;
    }
    .pipeline-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #B5634B;
    }
    .pipeline-count {
      font-size: 11px;
      font-weight: 700;
      width: 24px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">Client<span>Hub</span></div>
    <div class="topbar-avatar">FB</div>
  </div>
  <div class="tabs">
    <div class="tab active">Overview</div>
    <div class="tab">Clients</div>
    <div class="tab">Fulfillment</div>
    <div class="tab">Reports</div>
  </div>
  <div class="content">
    <div class="section-title">This Month</div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">24</div>
        <div class="stat-label">Active Clients</div>
        <div class="stat-change">+3 this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">$47K</div>
        <div class="stat-label">MRR</div>
        <div class="stat-change">+12% MoM</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">96%</div>
        <div class="stat-label">On-time</div>
        <div class="stat-change">+4% vs last</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Revenue by Client</div>
        <div class="chart-period">Last 6 months</div>
      </div>
      <div class="bar-chart">
        <div class="bar light" style="height:45%"></div>
        <div class="bar light" style="height:52%"></div>
        <div class="bar light" style="height:48%"></div>
        <div class="bar accent" style="height:68%"></div>
        <div class="bar accent" style="height:75%"></div>
        <div class="bar accent" style="height:90%"></div>
      </div>
      <div class="bar-labels">
        <div class="bar-label">Oct</div>
        <div class="bar-label">Nov</div>
        <div class="bar-label">Dec</div>
        <div class="bar-label">Jan</div>
        <div class="bar-label">Feb</div>
        <div class="bar-label">Mar</div>
      </div>
    </div>

    <div class="section-title">Delivery Pipeline</div>
    <div class="pipeline-section">
      <div class="pipeline-row">
        <div class="pipeline-stage">Intake</div>
        <div class="pipeline-bar-bg"><div class="pipeline-bar-fill" style="width:35%"></div></div>
        <div class="pipeline-count">8</div>
      </div>
      <div class="pipeline-row">
        <div class="pipeline-stage">In Progress</div>
        <div class="pipeline-bar-bg"><div class="pipeline-bar-fill" style="width:60%"></div></div>
        <div class="pipeline-count">14</div>
      </div>
      <div class="pipeline-row">
        <div class="pipeline-stage">Review</div>
        <div class="pipeline-bar-bg"><div class="pipeline-bar-fill" style="width:25%"></div></div>
        <div class="pipeline-count">6</div>
      </div>
      <div class="pipeline-row">
        <div class="pipeline-stage">Delivered</div>
        <div class="pipeline-bar-bg"><div class="pipeline-bar-fill" style="width:85%"></div></div>
        <div class="pipeline-count">19</div>
      </div>
    </div>
  </div>
</body>
</html>
