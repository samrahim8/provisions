<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Provisions</title>
  <link rel="icon" type="image/png" href="images/logo-p.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #2C2118;
      color: #F5F1EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    p {
      color: rgba(245, 241, 235, 0.6);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #F5F1EB;
      text-decoration: none;
      padding: 0.9rem 2.5rem;
      border: 1px solid rgba(245, 241, 235, 0.3);
      border-radius: 4px;
      transition: all 0.25s;
      display: inline-block;
    }
    a:hover {
      background: rgba(245, 241, 235, 0.1);
      border-color: rgba(245, 241, 235, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Nothing on this shelf. Must've been moved.</p>
    <a href="/">Back to the counter</a>
  </div>
</body>
</html>
