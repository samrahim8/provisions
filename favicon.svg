<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- rounded-square black tile -->
  <rect width="512" height="512" rx="96" ry="96" fill="#000000"/>

  <!-- 4 white horizontal stripes -->
  <g fill="#ffffff">
    <rect x="0" y="160" width="512" height="48"/>
    <rect x="0" y="248" width="512" height="48"/>
    <rect x="0" y="336" width="512" height="48"/>
    <rect x="0" y="424" width="512" height="48"/>
  </g>

  <!-- canton: black, top-left, overlays top of first stripe area -->
  <rect x="0" y="0" width="240" height="216" fill="#000000"/>

  <!-- white star centered in canton (cx=120, cy=108, outer r ≈ 80) -->
  <path d="M120 36
           L143.5 87.1
           L199.6 92.0
           L157.0 128.6
           L170.2 183.4
           L120 154.6
           L69.8 183.4
           L83.0 128.6
           L40.4 92.0
           L96.5 87.1 Z"
        fill="#ffffff"/>
</svg>
