<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Off the pitch · Provisions World Cup</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=IBM+Plex+Mono:wght@500;600&family=EB+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --leather: #1A1A1A;
      --cream: #F0E9DC;
      --terracotta: #C8462E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--leather);
      color: var(--cream);
      font-family: "IBM Plex Mono", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      gap: 40px;
    }
    .code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.32em;
      color: var(--terracotta);
      font-weight: 600;
      text-transform: uppercase;
    }
    h1 {
      font-family: "Big Shoulders Display", sans-serif;
      font-weight: 900;
      font-size: clamp(72px, 16vw, 200px);
      line-height: 0.9;
      letter-spacing: -0.02em;
    }
    .italic {
      font-family: "EB Garamond", serif;
      font-style: italic;
      font-weight: 500;
      color: var(--cream);
      opacity: 0.7;
    }
    p {
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.04em;
      opacity: 0.72;
      max-width: 38ch;
      line-height: 1.6;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 28px;
      background: var(--cream);
      color: var(--leather);
      text-decoration: none;
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 999px;
      transition: transform 0.15s ease;
    }
    .back:hover { transform: translateY(-2px); }
    .mascot {
      stroke: var(--cream);
      opacity: 0.4;
    }
    .mark-strip {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.32em;
      opacity: 0.55;
      text-transform: uppercase;
    }
    .mark-strip a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(245,241,235,0.3); padding-bottom: 2px; }
  </style>
</head>
<body>
  <svg class="mascot" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="9" cy="6" r="2"/>
    <path d="M9 8 v3 l-3 4 v6 M9 11 l3 4 v6 M5 14 h8 M11 13 l-2 -3"/>
  </svg>
  <div>
    <div class="code">404 · Off the Pitch</div>
    <h1>Wrong<br><span class="italic">tunnel.</span></h1>
  </div>
  <p>That page isn't part of this tournament. Head back to the hub for the fixtures, kits, and your player card.</p>
  <a class="back" href="/">
    Back to the hub
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
  </a>
  <div class="mark-strip">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="9" cy="6" r="2"/>
      <path d="M9 8 v3 l-3 4 v6 M9 11 l3 4 v6 M5 14 h8 M11 13 l-2 -3"/>
    </svg>
    A <a href="https://provisions.work">Provisions</a> joint
  </div>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
